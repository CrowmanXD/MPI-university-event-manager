services:
  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: event_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: event_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d

  # Backend (Node.js API)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: event_backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://admin:secretpassword@db:5432/event_manager
      - PORT=8080
    depends_on:
      - db

  # Frontend (Next.js)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: event_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data: